spring:
  application:
    name: ainativeos-control-plane
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ainativeos}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:ainativeos}
    password: ${DB_PASSWORD:ainativeos_pwd}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${APP_PORT:8080}

ainativeos:
  execution:
    default-max-retries: ${DEFAULT_MAX_RETRIES:2}
    rollback-on-failure: ${ROLLBACK_ON_FAILURE:true}
    default-op-timeout-seconds: ${DEFAULT_OP_TIMEOUT_SECONDS:60}
    circuit-breaker-failure-threshold: ${CIRCUIT_BREAKER_FAILURE_THRESHOLD:3}
    circuit-breaker-open-seconds: ${CIRCUIT_BREAKER_OPEN_SECONDS:60}
    rate-limit-per-minute: ${RATE_LIMIT_PER_MINUTE:120}
    profiles:
      strict:
        max-retries: ${STRICT_MAX_RETRIES:1}
        rollback-on-failure: ${STRICT_ROLLBACK_ON_FAILURE:true}
        op-timeout-seconds: ${STRICT_OP_TIMEOUT_SECONDS:45}
        circuit-breaker-failure-threshold: ${STRICT_CIRCUIT_BREAKER_FAILURE_THRESHOLD:2}
        circuit-breaker-open-seconds: ${STRICT_CIRCUIT_BREAKER_OPEN_SECONDS:120}
        rate-limit-per-minute: ${STRICT_RATE_LIMIT_PER_MINUTE:60}
      relaxed:
        max-retries: ${RELAXED_MAX_RETRIES:4}
        rollback-on-failure: ${RELAXED_ROLLBACK_ON_FAILURE:true}
        op-timeout-seconds: ${RELAXED_OP_TIMEOUT_SECONDS:120}
        circuit-breaker-failure-threshold: ${RELAXED_CIRCUIT_BREAKER_FAILURE_THRESHOLD:5}
        circuit-breaker-open-seconds: ${RELAXED_CIRCUIT_BREAKER_OPEN_SECONDS:30}
        rate-limit-per-minute: ${RELAXED_RATE_LIMIT_PER_MINUTE:300}
  llm:
    enabled: ${LLM_ENABLED:false}
    provider: ${LLM_PROVIDER:openai}
    endpoint: ${LLM_ENDPOINT:https://api.openai.com/v1/chat/completions}
    api-key: ${LLM_API_KEY:}
    model: ${LLM_MODEL:gpt-4o-mini}
    fallback-provider: ${LLM_FALLBACK_PROVIDER:}
    fallback-endpoint: ${LLM_FALLBACK_ENDPOINT:}
    fallback-api-key: ${LLM_FALLBACK_API_KEY:}
    fallback-model: ${LLM_FALLBACK_MODEL:}
    timeout-seconds: ${LLM_TIMEOUT_SECONDS:20}
  reconcile:
    controller-interval-ms: ${RECONCILE_CONTROLLER_INTERVAL_MS:5000}
