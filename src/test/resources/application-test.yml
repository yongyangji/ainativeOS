spring:
  datasource:
    url: jdbc:h2:mem:ainativeos;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: false
  task:
    scheduling:
      enabled: false

logging:
  level:
    root: WARN

ainativeos:
  llm:
    enabled: true
