version: "3.9"
services:
  mysql:
    image: mysql:8.4
    container_name: ainativeos-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: ainativeos
      MYSQL_USER: ainativeos
      MYSQL_PASSWORD: ainativeos_pwd
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
