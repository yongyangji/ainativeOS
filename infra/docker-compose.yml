services:
  mysql:
    image: mysql:8.4
    container_name: ainativeos-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: ainativeos
      MYSQL_USER: ainativeos
      MYSQL_PASSWORD: ainativeos_pwd
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10

  control-plane:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: ainativeos-control-plane
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ainativeos
      DB_USER: ainativeos
      DB_PASSWORD: ainativeos_pwd
      APP_PORT: 8080
    ports:
      - "8080:8080"

volumes:
  mysql_data:
