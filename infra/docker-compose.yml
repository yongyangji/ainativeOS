services:
  mysql:
    image: mysql:8.4
    container_name: ainativeos-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: ainativeos
      MYSQL_USER: ainativeos
      MYSQL_PASSWORD: ainativeos_pwd
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10

  control-plane:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: ainativeos-control-plane
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ainativeos
      DB_USER: ainativeos
      DB_PASSWORD: ainativeos_pwd
      APP_PORT: 8080
      LLM_ENABLED: ${LLM_ENABLED:-false}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_ENDPOINT: ${LLM_ENDPOINT:-https://api.openai.com/v1/chat/completions}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-20}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    container_name: ainativeos-frontend
    restart: unless-stopped
    depends_on:
      - control-plane
    ports:
      - "8081:80"

volumes:
  mysql_data:
